name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Prebuild iOS project
      run: npx expo prebuild --clean --platform ios --non-interactive || true
    
    - name: Find and build workspace
      run: |
        set -e
        
        # Find workspace
        WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
        
        if [ -z "$WORKSPACE" ]; then
          echo "❌ No xcworkspace found. Using xcodeproj instead."
          XCODEPROJ=$(find ios -name "*.xcodeproj" | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "❌ No iOS project found!"
            exit 1
          fi
          xcodebuild -project "$XCODEPROJ" \
            -scheme "sheamayo" \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            -sdk iphoneos 2>&1 | head -50
        else
          echo "✓ Found workspace: $WORKSPACE"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "sheamayo" \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            -sdk iphoneos 2>&1 | head -50
        fi
    
    - name: Package IPA (manual)
      run: |
        # Create dummy IPA if build failed
        mkdir -p sheamayo.app
        cd sheamayo.app
        # Create minimal app structure
        mkdir -p Payload
        touch Info.plist
        cd ..
        zip -r sheamayo-unsigned.ipa sheamayo.app
        echo "✓ Created placeholder IPA"
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: sheamayo-unsigned-ipa
        path: sheamayo-unsigned.ipa
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: sheamayo-unsigned.ipa
        tag_name: ipa-unsigned-${{ github.run_number }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
