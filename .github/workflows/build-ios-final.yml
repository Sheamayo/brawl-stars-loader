name: Build iOS IPA (Final)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Prebuild iOS
      run: npx expo prebuild --clean --platform ios --non-interactive
    
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true
    
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update 2>&1 | tee pod-install.log
        echo ""
        echo "=== CocoaPods Success ==="
        ls -la | grep -i xcworkspace
    
    - name: List schemes
      run: |
        cd ios
        xcodebuild -workspace BrawlStarsToolLoader.xcworkspace -list 2>&1 | tee schemes.log
    
    - name: Build Release (verbose)
      run: |
        cd ios
        xcodebuild \
          -workspace BrawlStarsToolLoader.xcworkspace \
          -scheme BrawlStarsToolLoader \
          -configuration Release \
          -derivedDataPath build \
          -arch arm64 \
          -sdk iphoneos \
          -verbose \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          2>&1 | tee build.log
        
        echo ""
        echo "Build exit code: $?"
    
    - name: Check build artifacts
      if: always()
      run: |
        echo "=== Checking for .app bundle ==="
        find ios/build -name "*.app" -type d 2>/dev/null || echo "❌ No .app found"
        
        echo ""
        echo "=== build directory structure ==="
        ls -la ios/build 2>/dev/null || echo "❌ build dir not found"
        
        echo ""
        echo "=== Checking for build errors in log ==="
        grep -i "error" ios/build.log | head -20
    
    - name: Package IPA
      continue-on-error: true
      run: |
        APP_PATH=$(find ios/build -name "BrawlStarsToolLoader.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ App bundle not found - build failed"
          exit 1
        fi
        
        echo "✓ Found app: $APP_PATH"
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        
        zip -qr BrawlStarsToolLoader-unsigned.ipa Payload/
        echo "✓ IPA created"
        ls -lh BrawlStarsToolLoader-unsigned.ipa
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ios/build.log
          ios/pod-install.log
          ios/schemes.log
        retention-days: 7
    
    - name: Upload IPA (if exists)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-ipa
        path: BrawlStarsToolLoader-unsigned.ipa
        retention-days: 7
