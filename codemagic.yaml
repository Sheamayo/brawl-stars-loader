workflows:
  ios-build:
    name: iOS IPA Build
    environment:
      xcode: latest
      node: 18
    triggering:
      events:
        - push
      branch:
        patterns:
          - pattern: main
            include: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Prebuild iOS
        script: npx expo prebuild --clean --platform ios --non-interactive
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS app
        script: |
          cd ios
          xcodebuild \
            -workspace BrawlStarsToolLoader.xcworkspace \
            -scheme BrawlStarsToolLoader \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS=""
      - name: Package unsigned IPA
        script: |
          APP=$(find ios/build -name "BrawlStarsToolLoader.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "App not found"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr BrawlStarsToolLoader-unsigned.ipa Payload/
    artifacts:
      - BrawlStarsToolLoader-unsigned.ipa
